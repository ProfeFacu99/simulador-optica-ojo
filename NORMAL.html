<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Simulador: Visión Normal</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
        }
        .canvas-wrapper {
            width: 100%;
            max-width: 900px;
            background: #fff;
            border: 1px solid #ddd;
            border-radius: 8px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            overflow: hidden;
            margin-bottom: 20px;
        }
        canvas {
            display: block;
            width: 100%;
            height: auto;
        }
        .controls-container {
            display: flex;
            flex-direction: column;
            gap: 15px;
            width: 95%;
            max-width: 900px;
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 15px;
            align-items: center;
        }
        .control-group {
            width: 100%;
            max-width: 300px;
        }
        label { font-size: 14px; font-weight: 600; color: #555; margin-bottom: 4px; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #2980b9; margin: 0; height: 28px; }
        .slider-labels {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            color: #888;
            margin-top: 2px;
        }
    </style>
</head>
<body>

    <div class="canvas-wrapper">
        <canvas id="simCanvas"></canvas>
    </div>

    <div class="controls-container">
        <div class="control-group">
            <label>Posición del objeto</label>
            <input type="range" id="objPos" min="450" max="850" value="700">
            <div class="slider-labels">
                <span>cerca</span>
                <span>lejos</span>
            </div>
        </div>
        <div class="control-group">
            <label>Enfoque del cristalino</label>
            <input type="range" id="focusLevel" min="80" max="150" value="115">
            <div class="slider-labels">
                <span>grueso</span>
                <span>delgado</span>
            </div>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');

        const W = 900, H = 400;

        const objPosSlider = document.getElementById('objPos');
        const focusLevelSlider = document.getElementById('focusLevel');

        const centerY = 220;
        const frontX = 280;
        const lensX = 240;

        const condition = 'normal';

        function resizeCanvas() {
            const wrapper = canvas.parentElement;
            const displayW = wrapper.clientWidth;
            const displayH = displayW * (H / W);
            const dpr = window.devicePixelRatio || 1;
            canvas.width  = displayW * dpr;
            canvas.height = displayH * dpr;
            ctx.setTransform((displayW / W) * dpr, 0, 0, (displayH / H) * dpr, 0, 0);
            draw();
        }

        function draw() {
            ctx.clearRect(0, 0, W, H);

            const objX = parseInt(objPosSlider.value);
            const focusLevel = parseInt(focusLevelSlider.value);

            let eyeRadiusX = 95;
            const eyeRadiusY = 95;

            let eyeCenterX = frontX - eyeRadiusX;
            let retinaX = eyeCenterX - eyeRadiusX;

            // Eje Óptico
            ctx.beginPath();
            ctx.moveTo(0, centerY);
            ctx.lineTo(W, centerY);
            ctx.strokeStyle = '#aaa';
            ctx.setLineDash([5, 5]);
            ctx.stroke();
            ctx.setLineDash([]);

            // Globo Ocular
            ctx.beginPath();
            ctx.ellipse(eyeCenterX, centerY, eyeRadiusX, eyeRadiusY, 0, 0, Math.PI * 2);
            ctx.fillStyle = '#fcfcfc';
            ctx.fill();
            ctx.strokeStyle = '#000';
            ctx.lineWidth = 1.5;
            ctx.stroke();

            // Retina
            ctx.beginPath();
            ctx.ellipse(eyeCenterX, centerY, eyeRadiusX, eyeRadiusY, 0, Math.PI * 0.65, Math.PI * 1.35);
            ctx.strokeStyle = '#c0392b';
            ctx.lineWidth = 5;
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.font = '13px Arial';
            ctx.fillText('Retina', retinaX - 20, centerY + 115);

            // Córnea
            ctx.beginPath();
            ctx.ellipse(frontX, centerY, 15, 45, 0, -Math.PI * 0.4, Math.PI * 0.4);
            ctx.strokeStyle = '#3498db';
            ctx.lineWidth = 3;
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.fillText('Córnea', frontX + 5, centerY - 60);

            // Cálculo
            let di = 1 / ((1 / focusLevel) - (1 / (objX - lensX)));
            let imageX = lensX - di;

            // Trazado de Rayos
            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 1.5;
            const rayOffsets = [-35, 0, 35];

            rayOffsets.forEach(offset => {
                ctx.beginPath();
                ctx.moveTo(objX, centerY);
                ctx.lineTo(lensX, centerY + offset);
                let dx = imageX - lensX;
                let dy = centerY - (centerY + offset);
                let targetX = retinaX - 60;
                let scale = (targetX - lensX) / dx;
                let targetY = (centerY + offset) + dy * scale;
                ctx.lineTo(targetX, targetY);
                ctx.stroke();
            });

            // Cristalino
            let lensThickness = 32 - ((focusLevel - 80) * 0.25);
            ctx.beginPath();
            ctx.ellipse(lensX, centerY, lensThickness, 55, 0, 0, Math.PI * 2);
            ctx.fillStyle = 'rgba(173, 216, 230, 0.7)';
            ctx.fill();
            ctx.strokeStyle = '#2980b9';
            ctx.lineWidth = 1;
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.fillText('Cristalino', lensX - 28, centerY + 85);

            // Objeto
            ctx.beginPath();
            ctx.arc(objX, centerY, 8, 0, Math.PI * 2);
            ctx.fillStyle = '#2980b9';
            ctx.fill();
            ctx.fillStyle = '#000';
            ctx.fillText('Objeto', objX - 15, centerY - 15);

            // Punto Focal
            ctx.beginPath();
            ctx.arc(imageX, centerY, 6, 0, Math.PI * 2);
            ctx.fillStyle = '#e67e22';
            ctx.fill();
            ctx.strokeStyle = '#fff';
            ctx.lineWidth = 1.5;
            ctx.stroke();
            ctx.fillStyle = '#000';
            ctx.font = 'bold 12px Segoe UI';
            ctx.fillText('Foco', imageX - 14, centerY + 22);

            // Indicador
            let diff = Math.abs(imageX - retinaX);
            let isFocused = diff <= 5;
            ctx.font = 'bold 22px Segoe UI';
            ctx.textAlign = 'center';
            if (isFocused) {
                ctx.fillStyle = '#27ae60';
                ctx.fillText('Imagen enfocada en la retina', W / 2, 40);
            } else {
                ctx.fillStyle = '#c0392b';
                let msg = (imageX < retinaX) ? 'foco detrás de la retina' : 'foco antes de la retina';
                ctx.fillText('Imagen desenfocada (' + msg + ')', W / 2, 40);
            }
            ctx.textAlign = 'left';
        }

        [objPosSlider, focusLevelSlider].forEach(el => {
            el.addEventListener('input', draw);
            el.addEventListener('change', draw);
        });

        window.addEventListener('resize', resizeCanvas);
        resizeCanvas();
    </script>
</body>
</html>

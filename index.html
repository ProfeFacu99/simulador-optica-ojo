<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simulador óptico - Ojo humano</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background-color: #f8f9fa;
            color: #333;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 10px;
        }
        canvas {
            background-color: #ffffff;
            border: 1px solid #ddd;
            border-radius: 8px;
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .controls-container {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
            width: 100%;
            max-width: 900px;
            background: #ffffff;
            padding: 15px;
            border-radius: 8px;
            border: 1px solid #ddd;
            margin-top: 15px;
        }
        .control-group {
            display: flex;
            flex-direction: column;
            min-width: 150px;
            flex: 1;
        }
        label { font-size: 13px; font-weight: 600; color: #555; }
        .val-badge { color: #2980b9; font-weight: bold; }
        input[type="range"] { width: 100%; cursor: pointer; accent-color: #2980b9; }
        .slider-labels { display: flex; justify-content: space-between; font-size: 11px; color: #888; }
        select { padding: 8px; border-radius: 4px; border: 1px solid #ccc; }
    </style>
</head>
<body>

    <canvas id="simCanvas" width="900" height="400"></canvas>

    <div class="controls-container">
        <div class="control-group">
            <label>Posición del objeto</label>
            <input type="range" id="objPos" min="450" max="850" value="700">
            <div class="slider-labels"><span>cerca</span><span>lejos</span></div>
        </div>
        <div class="control-group">
            <label>Enfoque del cristalino</label>
            <input type="range" id="focusLevel" min="80" max="150" value="115">
            <div class="slider-labels"><span>grueso</span><span>delgado</span></div>
        </div>
        <div class="control-group">
            <label>Condición visual</label>
            <select id="eyeCondition">
                <option value="normal">Visión normal</option>
                <option value="miopia">Miopía</option>
                <option value="hipermetropia">Hipermetropía</option>
            </select>
        </div>
        <div class="control-group">
            <label>Potencia: <span id="diopterVal" class="val-badge">0.00 D</span></label>
            <input type="range" id="diopters" min="-5" max="5" step="0.25" value="0">
        </div>
    </div>

    <script>
        const canvas = document.getElementById('simCanvas');
        const ctx = canvas.getContext('2d');
        const objPosSlider = document.getElementById('objPos');
        const focusLevelSlider = document.getElementById('focusLevel');
        const eyeConditionSelect = document.getElementById('eyeCondition');
        const dioptersSlider = document.getElementById('diopters');
        const diopterVal = document.getElementById('diopterVal');

        const centerY = 220;
        const frontX = 280; 
        const lensX = 240;  
        const corrX = 360;  

        function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            const objX = parseInt(objPosSlider.value);
            const focusLevel = parseInt(focusLevelSlider.value);
            const condition = eyeConditionSelect.value;
            const D = parseFloat(dioptersSlider.value);

            let tipoLente = D > 0 ? ' (convergente)' : (D < 0 ? ' (divergente)' : '');
            diopterVal.textContent = (D > 0 ? '+' : '') + D.toFixed(2) + ' D' + tipoLente;

            let eyeRadiusX = condition === 'normal' ? 95 : (condition === 'miopia' ? 125 : 75);
            let eyeCenterX = frontX - eyeRadiusX;
            let retinaX = eyeCenterX - eyeRadiusX;

            // Dibujo simplificado para brevedad, lógica de rayos igual a la anterior
            ctx.beginPath(); ctx.moveTo(0, centerY); ctx.lineTo(canvas.width, centerY); ctx.strokeStyle = '#aaa'; ctx.setLineDash([5,5]); ctx.stroke(); ctx.setLineDash([]);
            ctx.beginPath(); ctx.ellipse(eyeCenterX, centerY, eyeRadiusX, 95, 0, 0, Math.PI * 2); ctx.fillStyle = '#fcfcfc'; ctx.fill(); ctx.stroke();
            ctx.beginPath(); ctx.ellipse(eyeCenterX, centerY, eyeRadiusX, 95, 0, Math.PI * 0.65, Math.PI * 1.35); ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 5; ctx.stroke();
            
            let imageX = D === 0 ? lensX - (1/((1/focusLevel)-(1/(objX-lensX)))) : lensX - (1/((1/focusLevel)-(1/(corrX - (1/((1/(800/D))-(1/(objX-corrX)))) - lensX))));
            
            // Rayos
            ctx.strokeStyle = '#2980b9'; ctx.lineWidth = 1.5;
            [-35, 0, 35].forEach(offset => {
                ctx.beginPath(); ctx.moveTo(objX, centerY);
                if (D !== 0) ctx.lineTo(corrX, centerY + offset);
                ctx.lineTo(lensX, centerY + offset);
                ctx.lineTo(retinaX - 60, (centerY + offset) + (centerY - (centerY + offset)) * ((retinaX - 60 - lensX) / (imageX - lensX)));
                ctx.stroke();
            });

            ctx.font = 'bold 22px Segoe UI'; ctx.textAlign = 'center';
            ctx.fillStyle = Math.abs(imageX - retinaX) <= 5 ? '#27ae60' : '#c0392b';
            ctx.fillText(Math.abs(imageX - retinaX) <= 5 ? 'Imagen enfocada en la retina' : 'Imagen desenfocada', canvas.width / 2, 40);
            ctx.textAlign = 'left';
        }

        [objPosSlider, focusLevelSlider, eyeConditionSelect, dioptersSlider].forEach(el => el.addEventListener('input', draw));
        draw();
    </script>
</body>
</html>
